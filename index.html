<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sayan & Dishani — Wedding Reception</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
body{margin:0;font-family:'Lato',sans-serif;background:#fdf6f0;color:#3b2a2a}
.caricature-section{text-align:center;padding:60px 20px;background:#fff}
.caricature-img-wrap{max-width:420px;margin:auto}
.caricature-img-wrap img{width:100%;border-radius:10px;box-shadow:0 16px 56px rgba(0,0,0,.15)}
.section-title{font-family:'Cormorant Garamond',serif;font-size:3rem;margin-bottom:25px}
.rsvp-section{padding:60px 20px;background:#3b2a2a;color:#fff;text-align:center}
input,select,textarea{width:100%;max-width:500px;padding:12px;margin:10px auto;display:block;border-radius:6px;border:none}
button{padding:14px 24px;border:none;border-radius:6px;background:#c9756c;color:#fff;cursor:pointer}
</style>
</head>
<body>
<section class="caricature-section">
  <h2 class="section-title">Save the Date</h2>
  <div class="caricature-img-wrap">
    <img src="disha_sayan_caricature.png" alt="Sayan & Dishani Save the Date"/>
  </div>
</section>

<section class="rsvp-section">
  <h2 class="section-title">RSVP</h2>
  <form id="rsvpForm">
    <input type="text" id="firstName" placeholder="First Name" required>
    <input type="text" id="lastName" placeholder="Last Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="tel" id="phone" placeholder="Phone Number">
    <select id="guestCount">
      <option value="1">1 Guest</option>
      <option value="2">2 Guests</option>
      <option value="3">3 Guests</option>
      <option value="4">4 Guests</option>
    </select>
    <textarea id="message" placeholder="Your wishes"></textarea>
    <button type="button" onclick="submitRSVP()">Send Response</button>
  </form>
  <p id="successMsg"></p>
</section>

<script>
function submitRSVP() {
  const payload = {
    firstName: document.getElementById('firstName').value,
    lastName: document.getElementById('lastName').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    guests: document.getElementById('guestCount').value,
    message: document.getElementById('message').value
  };

  fetch('https://formspree.io/f/mnjlgjwy', {
    method: 'POST',
    headers: {'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById('successMsg').innerText = "Thank you! Your RSVP has been received.";
    document.getElementById('rsvpForm').reset();
  })
  .catch(() => alert("Something went wrong. Please try again."));
}
</script>
</body>
</html>
